name: Keep Render Service Warm

on:
  schedule:
    - cron: '*/5 * * * *'  # Every 5 minutes
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render service (with retry)
        run: |
          for i in 1 2 3; do
            echo "Attempt $i..."
            if curl -s --max-time 500 https://twitch-video-gen.onrender.com/health; then
              echo "Service is warm!"
              exit 0
            fi
            sleep 10
          done
          echo "All attempts done"
          exit 0
