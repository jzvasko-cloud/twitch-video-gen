name: Keep Render Service Warm

on:
  schedule:
      - cron: '*/10 * * * *'
        workflow_dispatch:

        jobs:
          ping:
              runs-on: ubuntu-latest
                  steps:
                        - name: Ping Render service
                                run: |
                                          curl -s -o /dev/null -w "%{http_code} in %{time_total}s" \
                                                      https://twitch-video-gen.onrender.com/status/ping \
                                                                  --max-time 120 || true
                                                                            echo " - ping complete"
