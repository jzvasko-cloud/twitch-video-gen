name: Run ClipLoreTV Pipeline (Cron)

on:
  schedule:
    # 4x/day optimized for US gaming audiences:
    #   3:00 UTC = 11 PM ET (late night gaming)
    #  14:00 UTC = 10 AM ET (morning scroll)
    #  18:00 UTC =  2 PM ET (afternoon break)
    #  23:00 UTC =  7 PM ET (prime time gaming)
    - cron: '0 3,14,18,23 * * *'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  trigger-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger /cron endpoint
        env:
          CLIPLORE_API_SECRET: ${{ secrets.CLIPLORE_API_SECRET }}
        run: |
          echo "Triggering ClipLoreTV pipeline..."
          HTTP_CODE=$(curl -s -o response.json -w "%{http_code}" \
            --max-time 300 \
            -X POST \
            -H "Content-Type: application/json" \
            -H "X-Api-Key: $CLIPLORE_API_SECRET" \
            https://twitch-video-gen.onrender.com/cron)

          echo "HTTP status: $HTTP_CODE"
          echo "Response:"
          cat response.json | python3 -m json.tool 2>/dev/null || cat response.json

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "Pipeline triggered successfully!"
          else
            echo "Pipeline returned HTTP $HTTP_CODE"
            exit 1
          fi
